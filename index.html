<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="styles.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Geomini:wght@200..800&display=swap" rel="stylesheet" />
	</head>
	<body>
		<div class="postcard">
			<div class="postcard-header">
				<h1>My Postcard</h1>
				<img src="https://storage.googleapis.com/replit/images/1511936948186_53605a1f8e2f117b874504a42b735a7f.png" />
			</div>
			<div class="postcard-body">
				<div class="body-left">
					<p>Wow, I am just amazed I was able to create this postcard</p>
					<p>
						Just a couple of months ago I would have thought this required years and years of study. I am exited to find out how much I'm
						loving this!
					</p>
				</div>
				<div class="body-right">
					<input type="text" placeholder="Enter your Name" />
					<input type="text" placeholder="Enter your Email" />
					<input type="text" placeholder="Enter your comments" />
				</div>
			</div>
			<div class="postcard-footer">
				<button>Send My Postcard</button>
			</div>
		</div>
	</body>
</html>
